{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    {{ with .Params.tags }}
    <div class="tags">
      {{ range . }}<a href="{{ "tags/" | relURL }}{{ . | urlize }}/" class="tag">{{ . }}</a>{{ end }}
    </div>
    {{ end }}
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

  {{ if and .Site.Params.giscusRepo .Site.Params.giscusRepoId .Site.Params.giscusCategoryId }}
  <section class="post-comments">
    <h2>Comments</h2>
    <script>
    (function() {
      var theme = document.documentElement.getAttribute('data-theme') || 'dark';
      var s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', '{{ .Site.Params.giscusRepo }}');
      s.setAttribute('data-repo-id', '{{ .Site.Params.giscusRepoId }}');
      s.setAttribute('data-category', 'General');
      s.setAttribute('data-category-id', '{{ .Site.Params.giscusCategoryId }}');
      s.setAttribute('data-mapping', 'pathname');
      s.setAttribute('data-strict', '0');
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'top');
      s.setAttribute('data-theme', theme);
      s.setAttribute('data-lang', 'en');
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      document.querySelector('.post-comments').appendChild(s);
    })();
    </script>
  </section>
  {{ end }}
</article>
{{ end }}
